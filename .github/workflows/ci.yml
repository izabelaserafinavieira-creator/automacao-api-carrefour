name: Automacao API Usuarios

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Executar Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Jest com cobertura
        run: npm run test:coverage

      - name: Executar coleção Postman via Newman
        run: npm run newman:usuarios
        continue-on-error: true

      - name: Publicar relatórios como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-de-teste
          path: reports/
          retention-days: 30
